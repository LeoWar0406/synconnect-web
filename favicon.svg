<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="55%" stop-color="#5b2df5"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.86); opacity: .82; } }
      @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes sparkle { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.2); } }
      .mark { transform-origin: 32px 32px; animation: pulse 1.7s ease-in-out infinite; }
      .ring { transform-origin: 32px 32px; animation: orbit 2.6s linear infinite; }
      .spark { transform-origin: center; animation: sparkle 1.2s ease-in-out infinite; }
    </style>
  </defs>
  <rect class="mark" x="8" y="8" width="48" height="48" rx="14" fill="url(#g)" filter="url(#glow)"/>
  <g class="ring">
    <circle cx="32" cy="32" r="18" fill="none" stroke="#ffffff" stroke-opacity=".45" stroke-width="3" stroke-linecap="round" stroke-dasharray="22 90"/>
    <circle cx="50" cy="32" r="4" fill="#ffffff"/>
  </g>
  <path d="M23 34c3.5-5 14.5-5 18 0" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <circle class="spark" cx="25" cy="25" r="2.5" fill="#fff"/>
  <circle class="spark" cx="40" cy="25" r="2.5" fill="#fff" style="animation-delay:.25s"/>
</svg>
